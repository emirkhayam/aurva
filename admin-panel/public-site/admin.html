<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURVA - Админ-панель</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- Login Form -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full">
            <h1 class="text-2xl font-bold mb-6 text-center">AURVA Admin</h1>
            <form id="loginForm">
                <input type="email" id="email" placeholder="Email" required
                       class="w-full px-4 py-3 border rounded-lg mb-4">
                <input type="password" id="password" placeholder="Пароль" required
                       class="w-full px-4 py-3 border rounded-lg mb-4">
                <button type="submit"
                        class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">
                    Войти
                </button>
                <div id="loginError" class="hidden mt-4 p-3 bg-red-100 text-red-700 rounded"></div>
            </form>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="dashboardScreen" class="hidden min-h-screen">
        <nav class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                <h1 class="text-xl font-bold">AURVA Admin</h1>
                <div class="flex gap-4 items-center">
                    <a href="/generated-page.html" target="_blank" class="text-blue-600 hover:text-blue-700 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                        </svg>
                        На сайт
                    </a>
                    <button onclick="logout()" class="text-red-600 hover:text-red-700">Выйти</button>
                </div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-4">
            <!-- Tabs -->
            <div class="flex gap-2 mb-6">
                <button onclick="showTab('contacts')" class="tab-btn px-4 py-2 rounded bg-blue-600 text-white">Заявки</button>
                <button onclick="showTab('news')" class="tab-btn px-4 py-2 rounded bg-gray-200">Новости</button>
                <button onclick="showTab('members')" class="tab-btn px-4 py-2 rounded bg-gray-200">Участники</button>
            </div>

            <!-- Content Areas -->
            <div id="contactsTab" class="tab-content">
                <h2 class="text-2xl font-bold mb-4">Заявки на вступление</h2>
                <div id="contactsList" class="space-y-4"></div>
            </div>

            <div id="newsTab" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-4">Управление новостями</h2>
                <p class="text-gray-600">Coming soon...</p>
            </div>

            <div id="membersTab" class="tab-content hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">Управление участниками</h2>
                    <button onclick="openMemberModal()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                        + Добавить участника
                    </button>
                </div>
                <div id="membersList" class="grid gap-4"></div>
            </div>
        </div>
    </div>

    <!-- Member Modal -->
    <div id="memberModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="memberModalTitle" class="text-2xl font-bold">Добавить участника</h3>
                    <button onclick="closeMemberModal()" class="text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>

                <form id="memberForm" class="space-y-4">
                    <input type="hidden" id="memberId">

                    <div>
                        <label class="block text-sm font-medium mb-1">Название организации *</label>
                        <input type="text" id="memberName" required
                               class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Слаг (URL)</label>
                        <input type="text" id="memberSlug"
                               class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                               placeholder="Автоматически сгенерируется">
                        <p class="text-xs text-gray-500 mt-1">Оставьте пустым для автогенерации</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Описание</label>
                        <textarea id="memberDescription" rows="3"
                                  class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Веб-сайт</label>
                        <input type="url" id="memberWebsite"
                               class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                               placeholder="https://example.com">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Логотип</label>
                        <input type="file" id="memberLogo" accept="image/*"
                               class="w-full px-4 py-2 border rounded-lg">
                        <div id="currentLogo" class="mt-2 hidden">
                            <p class="text-sm text-gray-600 mb-2">Текущий логотип:</p>
                            <img id="currentLogoImg" src="" alt="Current logo" class="h-20 object-contain border rounded p-2">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Порядок отображения</label>
                            <input type="number" id="memberDisplayOrder" min="0" value="0"
                                   class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-1">Дата вступления</label>
                            <input type="date" id="memberJoinedDate"
                                   class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>

                    <div class="flex items-center">
                        <input type="checkbox" id="memberIsActive" checked
                               class="w-4 h-4 text-blue-600 rounded">
                        <label for="memberIsActive" class="ml-2 text-sm font-medium">Активен</label>
                    </div>

                    <div class="flex gap-3 pt-4">
                        <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
                            Сохранить
                        </button>
                        <button type="button" onclick="closeMemberModal()"
                                class="flex-1 bg-gray-200 text-gray-800 py-2 rounded-lg hover:bg-gray-300">
                            Отмена
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:9000/api';
        let authToken = localStorage.getItem('adminToken');

        // Check if logged in
        if (authToken) {
            showDashboard();
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    authToken = data.token;
                    localStorage.setItem('adminToken', authToken);
                    showDashboard();
                } else {
                    document.getElementById('loginError').textContent = data.error;
                    document.getElementById('loginError').classList.remove('hidden');
                }
            } catch (error) {
                alert('Ошибка соединения с сервером');
            }
        });

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            loadContacts();
        }

        function logout() {
            localStorage.removeItem('adminToken');
            location.reload();
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('bg-blue-600', 'text-white');
                el.classList.add('bg-gray-200');
            });

            document.getElementById(`${tab}Tab`).classList.remove('hidden');
            event.target.classList.add('bg-blue-600', 'text-white');
            event.target.classList.remove('bg-gray-200');

            if (tab === 'contacts') loadContacts();
            if (tab === 'members') loadMembers();
        }

        async function loadContacts() {
            try {
                const response = await fetch(`${API_URL}/contacts`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                const data = await response.json();

                const container = document.getElementById('contactsList');
                container.innerHTML = data.contacts.map(contact => `
                    <div class="bg-white p-4 rounded-lg shadow">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-semibold">${contact.name}</h3>
                                <p class="text-gray-600">${contact.phone}</p>
                                <p class="text-sm text-gray-500">${new Date(contact.createdAt).toLocaleString('ru-RU')}</p>
                            </div>
                            <span class="px-3 py-1 rounded text-sm ${getStatusColor(contact.status)}">
                                ${getStatusLabel(contact.status)}
                            </span>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading contacts:', error);
            }
        }

        function getStatusColor(status) {
            const colors = {
                'new': 'bg-blue-100 text-blue-800',
                'contacted': 'bg-yellow-100 text-yellow-800',
                'processed': 'bg-green-100 text-green-800',
                'rejected': 'bg-red-100 text-red-800'
            };
            return colors[status] || 'bg-gray-100 text-gray-800';
        }

        function getStatusLabel(status) {
            const labels = {
                'new': 'Новая',
                'contacted': 'Связались',
                'processed': 'Обработана',
                'rejected': 'Отклонена'
            };
            return labels[status] || status;
        }

        // ========== MEMBERS MANAGEMENT ==========

        async function loadMembers() {
            try {
                const response = await fetch(`${API_URL}/members?isActive=all`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                const data = await response.json();

                const container = document.getElementById('membersList');
                container.innerHTML = data.members.map(member => `
                    <div class="bg-white p-6 rounded-lg shadow hover:shadow-md transition-shadow">
                        <div class="flex items-start gap-4">
                            ${member.logoUrl ? `
                                <img src="${member.logoUrl}" alt="${member.name}" class="w-16 h-16 object-contain rounded border p-1">
                            ` : `
                                <div class="w-16 h-16 bg-gray-100 rounded border flex items-center justify-center">
                                    <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                                    </svg>
                                </div>
                            `}
                            <div class="flex-1">
                                <div class="flex justify-between items-start mb-2">
                                    <div>
                                        <h3 class="font-semibold text-lg">${member.name}</h3>
                                        <p class="text-sm text-gray-500">Слаг: ${member.slug}</p>
                                    </div>
                                    <span class="px-3 py-1 rounded text-sm ${member.isActive ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}">
                                        ${member.isActive ? 'Активен' : 'Неактивен'}
                                    </span>
                                </div>
                                ${member.description ? `<p class="text-gray-600 text-sm mb-2">${member.description}</p>` : ''}
                                <div class="flex gap-4 text-sm text-gray-500 mb-3">
                                    ${member.website ? `
                                        <a href="${member.website}" target="_blank" class="text-blue-600 hover:underline flex items-center gap-1">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                                            </svg>
                                            Сайт
                                        </a>
                                    ` : ''}
                                    <span>Порядок: ${member.displayOrder}</span>
                                    ${member.joinedDate ? `<span>Вступил: ${new Date(member.joinedDate).toLocaleDateString('ru-RU')}</span>` : ''}
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="editMember(${member.id})"
                                            class="px-4 py-2 bg-blue-100 text-blue-700 rounded hover:bg-blue-200 text-sm">
                                        Редактировать
                                    </button>
                                    <button onclick="deleteMemberConfirm(${member.id}, '${member.name.replace(/'/g, "\\'")}')"
                                            class="px-4 py-2 bg-red-100 text-red-700 rounded hover:bg-red-200 text-sm">
                                        Удалить
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading members:', error);
                alert('Ошибка загрузки участников');
            }
        }

        function openMemberModal(memberId = null) {
            document.getElementById('memberModal').classList.remove('hidden');
            document.getElementById('memberForm').reset();
            document.getElementById('memberId').value = '';
            document.getElementById('memberModalTitle').textContent = 'Добавить участника';
            document.getElementById('currentLogo').classList.add('hidden');

            if (memberId) {
                loadMemberForEdit(memberId);
            }
        }

        function closeMemberModal() {
            document.getElementById('memberModal').classList.add('hidden');
        }

        async function loadMemberForEdit(memberId) {
            try {
                const response = await fetch(`${API_URL}/members?isActive=all`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                const data = await response.json();
                const member = data.members.find(m => m.id === memberId);

                if (!member) {
                    alert('Участник не найден');
                    return;
                }

                document.getElementById('memberModalTitle').textContent = 'Редактировать участника';
                document.getElementById('memberId').value = member.id;
                document.getElementById('memberName').value = member.name;
                document.getElementById('memberSlug').value = member.slug;
                document.getElementById('memberDescription').value = member.description || '';
                document.getElementById('memberWebsite').value = member.website || '';
                document.getElementById('memberDisplayOrder').value = member.displayOrder;
                document.getElementById('memberIsActive').checked = member.isActive;

                if (member.joinedDate) {
                    const date = new Date(member.joinedDate);
                    document.getElementById('memberJoinedDate').value = date.toISOString().split('T')[0];
                }

                if (member.logoUrl) {
                    document.getElementById('currentLogo').classList.remove('hidden');
                    document.getElementById('currentLogoImg').src = member.logoUrl;
                }
            } catch (error) {
                console.error('Error loading member:', error);
                alert('Ошибка загрузки данных участника');
            }
        }

        function editMember(memberId) {
            openMemberModal(memberId);
        }

        document.getElementById('memberForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const memberId = document.getElementById('memberId').value;
            const formData = new FormData();

            formData.append('name', document.getElementById('memberName').value);

            const slug = document.getElementById('memberSlug').value.trim();
            if (slug) {
                formData.append('slug', slug);
            }

            const description = document.getElementById('memberDescription').value.trim();
            if (description) {
                formData.append('description', description);
            }

            const website = document.getElementById('memberWebsite').value.trim();
            if (website) {
                formData.append('website', website);
            }

            formData.append('displayOrder', document.getElementById('memberDisplayOrder').value);
            formData.append('isActive', document.getElementById('memberIsActive').checked);

            const joinedDate = document.getElementById('memberJoinedDate').value;
            if (joinedDate) {
                formData.append('joinedDate', joinedDate);
            }

            const logoFile = document.getElementById('memberLogo').files[0];
            if (logoFile) {
                formData.append('logo', logoFile);
            }

            try {
                const url = memberId ? `${API_URL}/members/${memberId}` : `${API_URL}/members`;
                const method = memberId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method,
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    alert(memberId ? 'Участник успешно обновлен' : 'Участник успешно создан');
                    closeMemberModal();
                    loadMembers();
                } else {
                    alert(data.error || 'Ошибка сохранения');
                }
            } catch (error) {
                console.error('Error saving member:', error);
                alert('Ошибка сохранения данных');
            }
        });

        async function deleteMemberConfirm(memberId, memberName) {
            if (!confirm(`Вы уверены, что хотите удалить "${memberName}"?`)) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/members/${memberId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    alert('Участник успешно удален');
                    loadMembers();
                } else {
                    const data = await response.json();
                    alert(data.error || 'Ошибка удаления');
                }
            } catch (error) {
                console.error('Error deleting member:', error);
                alert('Ошибка удаления');
            }
        }
    </script>
</body>
</html>
