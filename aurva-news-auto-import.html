<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURVA News Auto-Import Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 8px;
        }

        .info-box h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .info-box ol {
            margin-left: 20px;
            color: #555;
            line-height: 1.8;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #fetchBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        #fetchBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        #fetchBtn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        #importBtn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            display: none;
        }

        #importBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(56, 239, 125, 0.4);
        }

        .progress {
            margin-top: 20px;
            display: none;
        }

        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .status {
            text-align: center;
            color: #666;
            font-size: 14px;
            min-height: 20px;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .stat-card {
            background: rgba(102, 126, 234, 0.1);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .code-box {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-top: 10px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AURVA News Auto-Import</h1>
        <p class="subtitle">Автоматический импорт новостей с aurva.kg</p>

        <div class="info-box">
            <h3>📋 Инструкция:</h3>
            <ol>
                <li>Нажмите кнопку "Скачать новости"</li>
                <li>Файл автоматически скачается</li>
                <li>Переместите файл в папку: <code>backend/</code></li>
                <li>Запустите: <code>npm run import:manual</code></li>
            </ol>
        </div>

        <div class="btn-container">
            <button id="fetchBtn">🔽 Скачать новости</button>
            <button id="importBtn">✅ Готово!</button>
        </div>

        <div class="progress" id="progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="status" id="status"></div>
        </div>

        <div class="result" id="result"></div>

        <div class="stats" id="stats" style="display: none;">
            <div class="stat-card">
                <div class="stat-value" id="newsCount">0</div>
                <div class="stat-label">Новостей найдено</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="fileSize">0 KB</div>
                <div class="stat-label">Размер файла</div>
            </div>
        </div>
    </div>

    <script>
        const fetchBtn = document.getElementById('fetchBtn');
        const importBtn = document.getElementById('importBtn');
        const progress = document.getElementById('progress');
        const progressFill = document.getElementById('progressFill');
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        const stats = document.getElementById('stats');
        const newsCount = document.getElementById('newsCount');
        const fileSize = document.getElementById('fileSize');

        function updateProgress(percent, message) {
            progressFill.style.width = percent + '%';
            status.textContent = message;
        }

        function showResult(message, type) {
            result.textContent = message;
            result.className = 'result ' + type;
            result.style.display = 'block';
        }

        async function fetchAurvaNews() {
            try {
                fetchBtn.disabled = true;
                progress.style.display = 'block';
                result.style.display = 'none';
                stats.style.display = 'none';

                updateProgress(10, '🔍 Подключение к Tilda API...');

                const feedUrl = 'https://feed.tildacdn.com/api/getfeed/?feeduid=390736647451&size=100&sort[date]=desc';

                updateProgress(30, '📡 Загрузка новостей...');

                const response = await fetch(feedUrl);

                if (!response.ok) {
                    throw new Error('API вернул ошибку: ' + response.status);
                }

                const data = await response.json();

                updateProgress(60, '✅ Получено ' + (data.posts?.length || 0) + ' новостей');

                if (!data.posts || data.posts.length === 0) {
                    throw new Error('Не найдено новостей в feed');
                }

                updateProgress(80, '💾 Подготовка файла...');

                // Create JSON file
                const jsonContent = JSON.stringify(data, null, 2);
                const blob = new Blob([jsonContent], { type: 'application/json' });
                const url = URL.createObjectURL(blob);

                // Create download link
                const a = document.createElement('a');
                a.href = url;
                a.download = 'aurva-news-manual.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                updateProgress(100, '✅ Файл скачан!');

                // Show stats
                newsCount.textContent = data.posts.length;
                fileSize.textContent = (blob.size / 1024).toFixed(2) + ' KB';
                stats.style.display = 'grid';

                showResult('✅ Файл успешно скачан! Теперь:\n1. Переместите aurva-news-manual.json в папку backend/\n2. Запустите: npm run import:manual', 'success');

                importBtn.style.display = 'block';
                fetchBtn.textContent = '🔄 Скачать снова';
                fetchBtn.disabled = false;

            } catch (error) {
                console.error('Error:', error);
                updateProgress(0, '');
                showResult('❌ Ошибка: ' + error.message + '\n\nПопробуйте:\n1. Открыть https://aurva.kg/news в новой вкладке\n2. Затем вернуться сюда и нажать снова', 'error');
                fetchBtn.disabled = false;
                progress.style.display = 'none';
            }
        }

        fetchBtn.addEventListener('click', fetchAurvaNews);
        importBtn.addEventListener('click', () => {
            importBtn.textContent = '✅ Отлично!';
            setTimeout(() => {
                window.close();
            }, 500);
        });

        // Auto-start on load (optional)
        // window.addEventListener('load', () => {
        //     setTimeout(fetchAurvaNews, 1000);
        // });
    </script>
</body>
</html>
