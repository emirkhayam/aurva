services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - backend-uploads:/app/uploads
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - coolify
      - internal
      - supabase

  # Admin Panel Service (includes public website)
  # NOTE: Backend already serves public site at /
  # This container only serves React admin panel and proxies API to backend
  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
        - VITE_SUPABASE_URL=${SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    restart: unless-stopped
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin-panel.rule=Host(`aurva.kg`)"
      - "traefik.http.routers.admin-panel.entrypoints=https"
      - "traefik.http.routers.admin-panel.tls=true"
      - "traefik.http.routers.admin-panel.tls.certresolver=letsencrypt"
      - "traefik.http.services.admin-panel.loadbalancer.server.port=80"
    depends_on:
      - backend
    networks:
      - coolify
      - internal

volumes:
  backend-uploads:
  backend-data:

networks:
  coolify:
    external: true
    name: coolify
  supabase:
    external: true
    name: a048ksg80wksowg4s0skogcw
  internal:
    driver: bridge
