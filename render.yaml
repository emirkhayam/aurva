services:
  - type: web
    name: aurva-backend
    env: node
    region: frankfurt  # Ближайший регион к Кыргызстану
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
    disk:
      name: aurva-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1
